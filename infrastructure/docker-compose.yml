services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP (receives from postfix)
      - "8025:8025"   # Web UI
    networks:
      - mail

  postfix:
    image: juanluisbaptiste/postfix:latest
    environment:
      SMTP_SERVER: mailpit
      SMTP_PORT: "1025"
      SERVER_HOSTNAME: sigbah.local
    ports:
      - "2525:25"     # app sends here
    depends_on:
      - mailpit
    networks:
      - mail

networks:
  mail:
    driver: bridge
