services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - mail

  postfix:
    image: juanluisbaptiste/postfix:latest
    environment:
      SMTP_SERVER: mailpit
      SMTP_PORT: "1025"
      SERVER_HOSTNAME: sigbah.local
    ports:
      - "2525:25"
    depends_on:
      - mailpit
    networks:
      - mail

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

networks:
  mail:
    driver: bridge
