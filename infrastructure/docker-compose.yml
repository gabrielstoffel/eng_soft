services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - web

  frontend:
    build:
      context: ../frontend
    expose:
      - "80"
    networks:
      - web

  backend:
    build:
      context: ../backend
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-sigbah}
      MONGO_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      SMTP_HOST: postfix
      SMTP_PORT: "25"
    expose:
      - "8000"
    depends_on:
      - mongo
      - postfix
    networks:
      - web
      - mail
      - db

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - mail

  postfix:
    image: juanluisbaptiste/postfix:latest
    environment:
      SMTP_SERVER: mailpit
      SMTP_PORT: "1025"
      SERVER_HOSTNAME: sigbah.local
    ports:
      - "2525:25"
    depends_on:
      - mailpit
    networks:
      - mail

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - db

volumes:
  mongo_data:

networks:
  web:
    driver: bridge
  mail:
    driver: bridge
  db:
    driver: bridge
